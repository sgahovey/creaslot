; Configuration PHP de PRODUCTION (US-9.1).
; Distincte de docker/php/php.ini (dev) : pas d'affichage d'erreurs, OPcache figé.

display_errors         = Off
display_startup_errors = Off
log_errors             = On
expose_php             = Off

memory_limit           = 256M

; Fuseau horaire de La Réunion (UTC+4), cohérent avec le reste de l'application.
date.timezone          = Indian/Reunion

; Sessions sécurisées (OWASP).
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax

default_charset        = UTF-8

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
; Code figé dans une image immuable : aucune revalidation des timestamps -> perf.
opcache.validate_timestamps = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16

; Cache des chemins résolus.
realpath_cache_size = 4096K
realpath_cache_ttl  = 600
