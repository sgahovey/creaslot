[PHP]
; Limites pour les uploads et l'exécution
upload_max_filesize  = 20M
post_max_size        = 21M
memory_limit         = 256M
max_execution_time   = 60
max_input_time       = 60

; Affichage des erreurs en développement — désactiver en preprod/prod
display_errors       = On
display_startup_errors = On
error_reporting      = E_ALL
log_errors           = On

; Fuseau horaire de La Réunion (UTC+4)
date.timezone        = Indian/Reunion

; Sessions sécurisées
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax

; Encodage
default_charset      = UTF-8

; Cache des chemins résolus — critique sur bind mount Windows/WSL2.
; Defaults PHP (4M / 120s) trop bas pour Symfony dev sous Docker Desktop :
; chaque expiration force ~3000 stat() sur bind mount à ~0.86 ms/op (mesuré).
realpath_cache_size = 8M
realpath_cache_ttl  = 600

[opcache]
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; validate_timestamps=1 : PHP vérifie les changements de fichiers à chaque revalidate_freq secondes.
; Indispensable en développement pour que les modifications soient prises en compte.
; À passer à 0 en production pour de meilleures performances.
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.fast_shutdown=1
