server {
    listen 80;
    server_name localhost;

    # Point d'entrée Symfony (public/ est le document root)
    root /var/www/html/public;
    index index.php;

    # Compression gzip pour les réponses texte
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Headers de sécurité de base (OWASP)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs au format standard
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Endpoint de healthcheck interne — répond 200 sans passer par PHP-FPM
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        # Toutes les requêtes sont renvoyées vers index.php (front controller Symfony)
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        # Délégation à PHP-FPM via le service "app" sur le port 9000
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Paramètres de performance FastCGI
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
        fastcgi_read_timeout    60;
    }

    # Bloquer l'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Mise en cache des assets statiques (actif après installation Symfony/Encore)
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
