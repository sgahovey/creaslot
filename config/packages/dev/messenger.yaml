# En dev, on force l'envoi des emails en synchrone pour simplifier le débogage :
# pas besoin de lancer un worker `messenger:consume async` à chaque test, l'envoi
# vers Brevo SMTP a lieu immédiatement dans le process HTTP/CLI.
#
# En preprod/prod, ce fichier n'est PAS chargé (Symfony ne charge que le dossier
# correspondant à APP_ENV) — la config principale config/packages/messenger.yaml
# continue de router SendEmailMessage vers le transport `async` (Doctrine queue),
# ce qui est le comportement attendu pour ne pas bloquer les requêtes utilisateur
# sur l'envoi SMTP.
framework:
    messenger:
        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: sync

        transports:
            sync: 'sync://'
