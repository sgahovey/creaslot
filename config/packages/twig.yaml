twig:
    file_name_pattern: '*.twig'
    globals:
        # Libellé de l'environnement (preprod|prod) — bandeau visuel
        app_environment_label: '%env(APP_ENVIRONMENT_LABEL)%'
        # Booléen pré-production — préfixe [PRÉPROD] dans <title> et class CSS
        # Mettre APP_PREPROD=false en production Railway (doit toujours être défini)
        pre_production: '%env(bool:APP_PREPROD)%'

when@test:
    twig:
        strict_variables: true
