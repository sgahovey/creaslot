security:
    password_hashers:
        # argon2id imposé par la sécurité OWASP (plus moderne que bcrypt)
        App\Entity\Utilisateur:
            algorithm: argon2id

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_PERSONNEL, ROLE_AUDITEUR]
        ROLE_PERSONNEL:   [ROLE_AUDITEUR]

    # Note: Only the *first* matching rule is applied
    access_control:
        # - { path: ^/admin, roles: ROLE_SUPER_ADMIN }
        # - { path: ^/personnel, roles: ROLE_PERSONNEL }

when@test:
    security:
        password_hashers:
            # Coût réduit pour les tests (performance), algorithme inchangé
            App\Entity\Utilisateur:
                algorithm: argon2id
                time_cost: 1
                memory_cost: 10
