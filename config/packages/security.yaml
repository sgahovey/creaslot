security:
    password_hashers:
        # argon2id imposé par la sécurité OWASP (plus moderne que bcrypt)
        App\Entity\Utilisateur:
            algorithm: argon2id

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                default_target_path: /
            logout:
                path: app_logout
                target: /
                # Désactivé pour que les messages flash survivent à la déconnexion
                invalidate_session: false
            # Anti-brute-force (OWASP A07) : Symfony limite les tentatives échouées
            # par couple (identifiant + IP) ET globalement par IP (5× sur la fenêtre
            # par défaut), puis lève TooManyLoginAttemptsAuthenticationException.
            login_throttling:
                max_attempts: 5

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_PERSONNEL, ROLE_AUDITEUR]
        ROLE_PERSONNEL:   [ROLE_AUDITEUR]

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/deconnexion, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_SUPER_ADMIN }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }
        # - { path: ^/personnel, roles: ROLE_PERSONNEL }

when@test:
    security:
        password_hashers:
            # Coût réduit pour les tests (performance), algorithme inchangé.
            # time_cost minimum valide pour argon2id via Sodium = 3
            # (opsLimit < 3 lève « $opsLimit must be 3 or greater »).
            App\Entity\Utilisateur:
                algorithm: argon2id
                time_cost: 3
                memory_cost: 10
