# compose.prod.yml — 2 environnements (préprod + prod) derrière Caddy (US-9.2).
# Image build-once `creaslot:prod` (US-9.1). À lancer AVEC le fichier d'infra dédié :
#   docker compose -f compose.prod.yml --env-file .env.deploy.local <cmd>
#
# `name:` isole ce projet du projet de dev "creaslot" (conteneurs/volumes/réseau
# distincts) : un `down -v` ici n'affecte pas l'environnement de développement.
name: creaslot_prod

# Politique de logs Docker bornee (evite la croissance non bornee du driver json-file
# par defaut) : 3 fichiers de 10 Mo max par conteneur. Appliquee a tous les services.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Base commune aux conteneurs applicatifs (app + worker), image identique.
# Image prod construite par UN SEUL service (app-prod) puis partagee par les 4 services
# via "image: creaslot:prod". Porter "build:" sur l'ancre declenchait 4 builds paralleles
# du meme tag -> collision a l'export ("image already exists"). Cf US-9.3.
x-app-base: &app-base
  image: creaslot:prod
  restart: unless-stopped
  logging: *default-logging
  depends_on:
    db:
      condition: service_healthy

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_HTTP_PORT:-8081}:80"
    environment:
      PREPROD_HOST: ${PREPROD_HOST}
      PROD_HOST: ${PROD_HOST}
      CADDY_TLS: ${CADDY_TLS}
      CADDY_ACME_CA: ${CADDY_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
      PREPROD_BASICAUTH_USER: ${PREPROD_BASICAUTH_USER}
      PREPROD_BASICAUTH_HASH: ${PREPROD_BASICAUTH_HASH}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Assets compilés de chaque env (peuplés par l'entrypoint des apps), servis par file_server.
      - assets_preprod:/srv/preprod:ro
      - assets_prod:/srv/prod:ro
    depends_on:
      - app-preprod
      - app-prod
    networks:
      - creaslot-prod-net

  db:
    image: mysql:8.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PREPROD_PASSWORD: ${MYSQL_PREPROD_PASSWORD}
      MYSQL_PROD_PASSWORD: ${MYSQL_PROD_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      # Crée les 2 bases + 2 users au tout premier démarrage (volume vierge).
      - ./docker/mysql/init-prod.sh:/docker-entrypoint-initdb.d/init-prod.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - creaslot-prod-net

  app-preprod:
    <<: *app-base
    env_file:
      - .env.preprod
      - path: .env.preprod.local
        required: false
    volumes:
      - assets_preprod:/srv-assets
    networks:
      - creaslot-prod-net

  app-prod:
    <<: *app-base
    build:
      context: .
      target: runtime
    env_file:
      - .env.prod
      - path: .env.prod.local
        required: false
    volumes:
      - assets_prod:/srv-assets
    networks:
      - creaslot-prod-net

  worker-preprod:
    <<: *app-base
    command: ["php", "bin/console", "messenger:consume", "async", "-v", "--time-limit=3600", "--memory-limit=128M"]
    env_file:
      - .env.preprod
      - path: .env.preprod.local
        required: false
    networks:
      - creaslot-prod-net

  worker-prod:
    <<: *app-base
    command: ["php", "bin/console", "messenger:consume", "async", "-v", "--time-limit=3600", "--memory-limit=128M"]
    env_file:
      - .env.prod
      - path: .env.prod.local
        required: false
    networks:
      - creaslot-prod-net

volumes:
  assets_preprod:
  assets_prod:
  mysql_data_prod:
  caddy_data:
  caddy_config:

networks:
  creaslot-prod-net:
    driver: bridge
