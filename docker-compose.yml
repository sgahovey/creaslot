services:

  # ---------------------------------------------------------------------------
  # app : conteneur PHP-FPM 8.4 — point d'entrée de l'application Symfony
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      # Bind mount pour le rechargement à chaud du code en développement
      - .:/var/www/html
      # Named volumes : sortent var/cache et var/log du bind mount Windows (~600× plus lent
      # que le FS natif du conteneur sur les stat()). Indispensable sous Docker Desktop WSL2.
      # Reset propre via : docker compose down -v
      - symfony_cache:/var/www/html/var/cache
      - symfony_log:/var/www/html/var/log
      # Bind mount du php.ini : les modifications prennent effet avec un simple restart (sans rebuild)
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
    env_file:
      - .env
      - path: .env.local
        required: false
    networks:
      - creaslot-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo 'OK';\" | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # nginx : serveur web — expose l'application sur http://localhost:8000
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      # Accès au répertoire public/ pour servir les assets statiques
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - creaslot-net
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # phpmyadmin : interface web MySQL — http://localhost:8080 (dev uniquement)
  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-creaslot}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-creaslot}
    networks:
      - creaslot-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # db : MySQL 8 — persistance des données via volume nommé
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-creaslot}
      MYSQL_USER: ${MYSQL_USER:-creaslot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-creaslot}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    networks:
      - creaslot-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

# ------------------------------------------------------------------------------
# Volumes nommés — les données MySQL survivent aux arrêts/redémarrages
# ------------------------------------------------------------------------------
volumes:
  mysql_data:
    driver: local
  symfony_cache:
    driver: local
  symfony_log:
    driver: local

# ------------------------------------------------------------------------------
# Réseau interne — les services communiquent par leur nom de service (app, db)
# ------------------------------------------------------------------------------
networks:
  creaslot-net:
    driver: bridge
